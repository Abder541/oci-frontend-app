<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable – MyApp</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <style>
    .error-section {
      text-align: center;
      padding: 8rem 2rem;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .error-code {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 900;
      line-height: 1;
      color: #c74634;
      margin-bottom: 1rem;
    }
    .error-section h1 { font-size: clamp(1.5rem, 4vw, 2.5rem); margin-bottom: 1rem; }
    .error-section p  { font-size: 1.1rem; opacity: .75; margin-bottom: 2.5rem; max-width: 480px; }
    .btn-group { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo">&#9729; MyApp</a>
      <ul>
        <li><a href="index.html">Accueil</a></li>
        <li><a href="about.html">À propos</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="error-section">
      <div class="error-code">404</div>
      <h1>Page introuvable</h1>
      <p>La page que vous recherchez n'existe pas ou a été déplacée.</p>
      <div class="btn-group">
        <a href="index.html" class="btn">&#127968; Retour à l'accueil</a>
        <a href="about.html" class="btn" style="background: transparent; border: 2px solid #fff; color: #fff;">À propos</a>
      </div>
    </section>
  </main>

  <footer>
    <p id="footer-year">&copy; 2026 MyApp – Déployé sur GitHub Pages</p>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
